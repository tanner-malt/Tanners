baseURL = "https://tanner-mcgrath.me"
languageCode = "en-us"
title = "Techy Tanner"
theme = "congo"
timeZone = "America/New_York"

enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true

# Default content sections used for recent posts, search and feeds
mainSections = ["blog"]

# SEO summary length (words)
summaryLength = 30

[pagination]
  pagerSize = 10

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.7

[services]
  [services.rss]
    limit = 42

# Congo requires this for proper taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"

[params]
  description = "Techy Tanner — Tanner McGrath's blog on AI, software development, engineering, and learning in public."
  keywords = ["Tanner McGrath", "Techy Tanner", "AI", "machine learning", "software development", "engineering", "personal blog"]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = true

  enableSearch = true
  enableCodeCopy = true

  # Open Graph / social sharing defaults
  showAppearanceSwitcher = true
  robots = "index, follow"

  [params.header]
    layout = "fixed"
    showTitle = true
  
  [params.homepage]
    layout = "profile"
    homepageImage = ""
    showRecent = false

  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showWordCount = false
    showSummary = true
    sharingLinks = ["twitter", "linkedin", "reddit", "email"]

  [params.list]
    showBreadcrumbs = true
    showSummary = true
    showTableOfContents = false
    groupByYear = true

  [params.author]
    name = "Tanner McGrath"
    headline = "Tech Enthusiast & Builder"
    bio = "Developer, aspiring engineer, and lifelong learner building technology that matters."
    links = [
      { github = "https://github.com/tanner-malt" },
      { linkedin = "https://www.linkedin.com/in/tanner-mcgrath-aa6aa0228" },
      { kaggle = "https://www.kaggle.com/tannermcgrathlol" },
      { email = "mailto:tanner@tanner-mcgrath.me" }
    ]

[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 1
  [[menu.main]]
    name = "Blog"
    pageRef = "blog"
    weight = 2
  [[menu.main]]
    name = "About"
    pageRef = "about"
    weight = 3
  [[menu.main]]
    name = "Now"
    pageRef = "now"
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
